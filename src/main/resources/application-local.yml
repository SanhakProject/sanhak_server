spring:
  config:
    import:
      - classpath:application-local.yml
  datasource:
    url: jdbc:mysql://localhost:3306/${MYSQL_DATABASE:sanhak_local}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: create
  sql:
    init:
      mode: always
app:
  jwt:
    key: ${JWT_KEY}
    accessTokenValidityInMilliseconds: 3600000
server:
  servlet:
    context-path: /api