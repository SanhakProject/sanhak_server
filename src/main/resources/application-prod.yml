spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${MYSQL_DATABASE}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect
  sql:
    init:
      mode: never
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "${SERVER_URL}/api/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            scope:
                - profile_nickname
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET}
    region:
      static: ap-northeast-2
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}

app:
  jwt:
    key: ${JWT_KEY}
    accessTokenValidityInMilliseconds: ${JWT_ACCESS_TOKEN_EXPIRATION}
    refreshTokenValidityInMilliseconds: ${JWT_REFRESH_TOKEN_EXPIRATION}
  oauth:
    callback:
      success: ${FRONTEND_URL}/oauth/callback/success
      failure: ${FRONTEND_URL}/oauth/callback/failure

server:
  port: ${SERVER_PORT}
  servlet:
    context-path: /api

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

logging:
  level:
    root: INFO
    com.github.sanhak: INFO
